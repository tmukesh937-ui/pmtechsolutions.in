<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | PM Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .thank-you-box {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            padding: 4rem;
            backdrop-filter: blur(20px);
            z-index: 10;
        }
        .thank-you-box h1 {
            color: var(--primary);
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .thank-you-box p {
            color: #ccc;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>
    
    <div class="thank-you-box">
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent.<br>We'll get back to you shortly.</p>
        <p style="font-size: 0.9rem; color: #888;">Redirecting to the main page in <span id="countdown">5</span> seconds...</p>
        <a href="index.html" class="btn btn-primary mt-2"><span class="btn-text">Return Home</span></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Simple 3D background initialization
        function initThreeJS() {
            const container = document.getElementById('webgl-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(3, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x7e0ef5, wireframe: true, transparent: true, opacity: 0.3 });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.y += 0.002;
                mesh.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();
        }
        initThreeJS();

        // Redirection logic
        let count = 5;
        const countdownEl = document.getElementById('countdown');
        setInterval(() => {
            count--;
            countdownEl.innerText = count;
            if (count <= 0) {
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | PM Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .thank-you-box {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            padding: 4rem;
            backdrop-filter: blur(20px);
            z-index: 10;
        }
        .thank-you-box h1 {
            color: var(--primary);
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .thank-you-box p {
            color: #ccc;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>
    
    <div class="thank-you-box">
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent.<br>We'll get back to you shortly.</p>
        <p style="font-size: 0.9rem; color: #888;">Redirecting to the main page in <span id="countdown">5</span> seconds...</p>
        <a href="index.html" class="btn btn-primary mt-2"><span class="btn-text">Return Home</span></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Simple 3D background initialization
        function initThreeJS() {
            const container = document.getElementById('webgl-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(3, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x7e0ef5, wireframe: true, transparent: true, opacity: 0.3 });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.y += 0.002;
                mesh.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();
        }
        initThreeJS();

        // Redirection logic
        let count = 5;
        const countdownEl = document.getElementById('countdown');
        setInterval(() => {
            count--;
            countdownEl.innerText = count;
            if (count <= 0) {
                window.location.href = 'index.html';
        }
        }, 1000);
    </script>

    <!-- Floating WhatsApp Button — Premium -->
    <a href="https://wa.me/918140816138" target="_blank" rel="noopener noreferrer"
        class="whatsapp-float" aria-label="Chat with us on WhatsApp">
        <span class="whatsapp-pulse"></span>
        <span class="whatsapp-pulse"></span>
        <div class="whatsapp-content">
            <div class="whatsapp-text-wrap">
                <span class="whatsapp-label">We reply instantly</span>
                <span class="whatsapp-cta">Chat with us</span>
            </div>
            <div class="whatsapp-icon-wrapper">
                <svg viewBox="0 0 32 32" fill="currentColor" class="whatsapp-icon">
                    <path d="M16 2C8.28 2 2 8.28 2 16c0 2.5.68 4.84 1.86 6.86L2 30l7.34-1.82A13.94 13.94 0 0016 30c7.72 0 14-6.28 14-14S23.72 2 16 2zm0 25.5a11.45 11.45 0 01-5.84-1.6l-.42-.25-4.36 1.08 1.1-4.25-.27-.44A11.46 11.46 0 014.5 16C4.5 9.6 9.6 4.5 16 4.5S27.5 9.6 27.5 16 22.4 27.5 16 27.5zm6.28-8.57c-.34-.17-2.02-.99-2.34-1.11-.31-.11-.54-.17-.77.17-.23.34-.88 1.11-1.08 1.34-.2.23-.4.25-.74.08-.34-.17-1.44-.53-2.75-1.7-1.02-.9-1.7-2.02-1.9-2.36-.2-.34-.02-.52.15-.69.15-.15.34-.4.51-.6.17-.2.23-.34.34-.57.11-.23.06-.43-.03-.6-.08-.17-.77-1.85-1.05-2.53-.28-.67-.56-.58-.77-.59h-.66c-.23 0-.6.08-.91.4-.31.31-1.2 1.17-1.2 2.86s1.23 3.32 1.4 3.55c.17.23 2.42 3.7 5.86 5.19.82.35 1.46.56 1.96.72.82.26 1.57.22 2.16.13.66-.1 2.02-.82 2.31-1.62.28-.8.28-1.48.2-1.62-.08-.14-.31-.23-.65-.4z"/>
                </svg>
                <span class="whatsapp-status-dot"></span>
            </div>
        </div>
    </a>
</body>
</html>
